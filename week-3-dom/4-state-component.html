<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo list</title>
</head>

<style>
  .container div {
    padding: 10px;
  }

  .container span {
    margin-right: 10px;
  }
</style>

<body>
  <h1>Todo list</h1>

  <input type="text" placeholder="add task" />
  <button onclick="handleAddClick()">Add</button>

  <div class="container">
    <div class="todo-1">
      <span>Tasks will be shown here</span>
      <button onclick="handleDeleteClick(this)" id="5">Delete</button>
    </div>
  </div>

  <script>
    let counter = 2;
    const todos = [];

    function handleDeleteClick(element) {
      // remove task from todos!
      console.log("delete clicked");
      console.log(element);

      console.log(element.id);
      todos.splice(element.id, 1); // remove 1 element starting from index
      render();
    }

    function createTodoComponent(value, id) {
      const spanEl = document.createElement("span");
      const buttonEl = document.createElement("button");
      spanEl.textContent = value;
      buttonEl.textContent = "Delete";
      buttonEl.setAttribute("onclick", `handleDeleteClick(this)`);
      buttonEl.setAttribute("id", id);

      const divEl = document.createElement("div");
      divEl.appendChild(spanEl);
      divEl.appendChild(buttonEl);

      // divEl.setAttribute("class", "todo-" + counter);
      return divEl;
    }

    function render() {
      counter = 0;
      const container = document.querySelector(".container");
      container.innerHTML = "";
      todos.forEach((todo) => {
        const divElement = createTodoComponent(todo, counter++);
        container.insertAdjacentElement("beforeend", divElement);
      });
    }

    function handleAddClick() {
      const input = document.querySelector("input");
      if (input.value) {
        todos.push(input.value);
        input.value = "";
        render();
      }
    }
  </script>
</body>

</html>
